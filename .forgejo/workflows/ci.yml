name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - name: Basic validation
        run: echo "Repository validated"

  radicle-sync:
    name: Radicle Sync
    runs-on: native
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout from Forgejo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: forgejo-src

      - name: Sync to Radicle
        run: |
          set -e
          export PATH=$HOME/.radicle/bin:$PATH
          RID="rad:zZMfYUgMYFrR65onBNphF5uTp6dp"

          rm -rf radicle-repo
          NODE_ID=$(rad self --nid 2>/dev/null || rad self | grep -oP 'Node ID \(NID\): \K[a-z0-9]+')
          echo "Local node ID: $NODE_ID"

          if ! rad clone "$RID" radicle-repo 2>&1; then
            echo "rad clone failed, initializing from Forgejo source"
            rm -rf radicle-repo
            mkdir -p radicle-repo
            cd radicle-repo
            git init
            git remote add rad "rad://${RID#rad:}/$NODE_ID"
            git remote add forgejo ../forgejo-src
            git fetch forgejo main
            git checkout -b main forgejo/main
            git push rad main
            echo "Radicle sync complete (initialized)"
            exit 0
          fi

          cd radicle-repo
          git remote add forgejo ../forgejo-src 2>/dev/null || git remote set-url forgejo ../forgejo-src
          git fetch forgejo main
          git checkout main 2>/dev/null || git checkout -b main

          if ! git merge --ff-only forgejo/main 2>/dev/null; then
            echo "Fast-forward failed, forcing sync to Forgejo state"
            git reset --hard forgejo/main
          fi

          EXPECTED_COMMIT=$(git rev-parse HEAD)
          echo "Expected commit: $EXPECTED_COMMIT"

          git push rad main || echo "Push command returned error (may be broken pipe)"

          sleep 2
          RADICLE_HEAD=$(git -C ~/.radicle/storage/${RID#rad:} rev-parse --short=7 HEAD 2>/dev/null)
          if [ "${EXPECTED_COMMIT:0:7}" = "$RADICLE_HEAD" ]; then
            echo "Radicle sync verified: $RADICLE_HEAD"
          else
            echo "ERROR: Radicle sync verification failed"
            echo "Expected: ${EXPECTED_COMMIT:0:7}, Got: $RADICLE_HEAD"
            exit 1
          fi

